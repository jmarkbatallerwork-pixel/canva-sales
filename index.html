<!DOCTYPE html>
<html>
<head>
  <title>Customer Backup Information</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Customer Backup Information</h1>

    <form id="saleForm">
      <input type="text" id="full_name" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email Address" required />

      <select id="plan" required>
        <option value="">Select Plan</option>
        <option value="Basic">Basic</option>
        <option value="Pro">Pro</option>
        <option value="Enterprise">Enterprise</option>
      </select>

      <input type="number" id="amount_paid" placeholder="Amount Paid" required />
      <input type="file" id="receipt" accept="image/*,application/pdf" required />

      <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
  </div>

  <script type="module" src="form.js"></script>
</body>
</html>
